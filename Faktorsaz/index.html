<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>فاکتورساز | صدور فاکتور رسمی</title>
    <style>
        :root {
            --bg: #02010a;
            --surface: rgba(17, 15, 28, 0.75);
            --surface2: rgba(30, 25, 50, 0.55);
            --text: #f1f5f9;
            --text2: #94a3b8;
            --primary: #06b6d4;
            --primary-glow: #22d3ee;
            --gold: #f59e0b;
            --danger: #ef4444;
            --danger-glow: #f87171;
            --success: #10b981;
            --success-glow: #34d399;
            --border: rgba(255, 255, 255, 0.07);
            --glass-blur: blur(22px);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --shadow: 0 8px 32px rgba(0,0,0,0.5);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.6);
            --radius-sm: 12px;
            --radius: 18px;
            --radius-lg: 24px;
            --font: 'Vazirmatn', system-ui, -apple-system, sans-serif;
            direction: rtl;
            scroll-behavior: smooth;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font);
            background: #02010a;
            color: var(--text);
            line-height: 1.75;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 18px;
            overflow-x: hidden;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }
        .galaxy {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at 60% 15%, #061e24 0%, transparent 55%),
                radial-gradient(ellipse at 30% 70%, #100520 0%, transparent 50%);
            z-index: 0; pointer-events: none;
        }
        .stars-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .nebula {
            position: fixed; bottom: -10%; right: -5%; width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(6,182,212,0.10) 0%, transparent 70%);
            border-radius: 50%; filter: blur(55px); animation: nebulaDrift 22s ease-in-out infinite;
            pointer-events: none; z-index: 0;
        }
        @keyframes nebulaDrift {
            0%,100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(-25px,20px) scale(1.1); }
            66% { transform: translate(20px,-15px) scale(0.9); }
        }
        .grid-pattern {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background-image: linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
            background-size: 45px 45px; pointer-events:none; z-index:0;
        }

        .container { position: relative; z-index: 1; max-width: 750px; width: 100%; display: flex; flex-direction: column; gap: 18px; }

        .hero {
            background: rgba(17,15,28,0.65); backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border); border-radius: var(--radius-lg);
            padding: 24px 20px; text-align: center; box-shadow: var(--shadow-lg);
        }
        .hero h1 { font-size: clamp(1.5rem, 4vw, 2rem); font-weight: 900; color: var(--primary-glow); }
        .stats-row { display: flex; justify-content: center; gap: 20px; margin-top: 10px; flex-wrap: wrap; }
        .stat-item { text-align: center; }
        .stat-val { font-size: 1.3rem; font-weight: 900; }
        .stat-val.cyan { color: var(--primary-glow); }
        .stat-val.gold { color: var(--gold); }
        .stat-lbl { font-size: 0.75rem; color: var(--text2); }

        .filter-bar { display: flex; flex-wrap: wrap; gap: 8px; }
        .filter-bar input {
            flex: 2; min-width: 140px; padding: 12px 16px; border-radius: 30px;
            border: 2px solid var(--border); background: rgba(17,15,28,0.55);
            backdrop-filter: blur(10px); color: #fff; font-family: inherit; font-size: 0.9rem;
        }
        .filter-bar input:focus { border-color: var(--primary); outline: none; }
        .btn {
            padding: 11px 18px; border-radius: 30px; border: none; font-family: inherit;
            font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.2s ease;
            display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
        }
        .btn.primary { background: var(--primary); color: #000; }
        .btn.outline { background: transparent; border: 2px solid var(--primary); color: var(--primary-glow); }
        .btn.danger { background: var(--danger); color: #fff; }
        .btn.back {
            background: transparent; border: 2px solid var(--primary); color: var(--primary-glow);
            text-decoration: none; width: fit-content; margin-top: 4px;
        }
        .btn:active { transform: scale(0.96); }

        .invoice-list { display: grid; gap: 10px; }
        .invoice-card {
            background: rgba(17,15,28,0.55); backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border); border-radius: var(--radius);
            padding: 16px; display: flex; align-items: center; gap: 12px;
            box-shadow: var(--shadow-sm); transition: all 0.2s ease; flex-wrap: wrap; cursor: pointer;
        }
        .invoice-card:hover { border-color: rgba(6,182,212,0.3); box-shadow: 0 6px 20px rgba(6,182,212,0.12); }
        .inv-info { flex: 1; min-width: 140px; }
        .inv-number { font-weight: 700; font-size: 1rem; color: var(--primary-glow); }
        .inv-customer { font-size: 0.9rem; }
        .inv-meta { font-size: 0.8rem; color: var(--text2); }
        .inv-total { font-weight: 700; color: var(--gold); font-size: 1rem; white-space: nowrap; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.78); backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
            z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal {
            background: rgba(24,22,36,0.95); backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border); border-radius: var(--radius-lg);
            padding: 24px 20px; width: 92%; max-width: 550px; box-shadow: var(--shadow-lg);
            max-height: 85vh; overflow-y: auto;
        }
        .modal h3 { color: var(--primary-glow); margin-bottom: 14px; text-align: center; font-size: 1.15rem; }
        .form-row { margin: 8px 0; text-align: right; }
        .form-row label { display: block; margin-bottom: 5px; color: var(--text2); font-size: 0.85rem; }
        .form-row input { width: 100%; padding: 13px 14px; border-radius: var(--radius-sm); border: 2px solid var(--border); background: #0f0c1a; color: #fff; font-family: inherit; font-size: 0.9rem; }
        .form-row input:focus { border-color: var(--primary); outline: none; }
        .item-row { display: flex; gap: 8px; align-items: center; margin: 6px 0; flex-wrap: wrap; }
        .item-row input { flex: 1; min-width: 60px; padding: 10px; border-radius: 8px; border: 2px solid var(--border); background: #0f0c1a; color: #fff; font-family: inherit; font-size: 0.85rem; }
        .item-row input:focus { border-color: var(--primary); outline: none; }
        .btn-row { display: flex; gap: 10px; margin-top: 16px; }
        .btn-row .btn { flex: 1; justify-content: center; }

        .preview-box {
            background: #fff; color: #000; padding: 25px; border-radius: var(--radius-sm);
            font-size: 0.9rem; line-height: 2; max-height: 70vh; overflow-y: auto;
        }
        .preview-box table { width: 100%; border-collapse: collapse; margin: 12px 0; }
        .preview-box th, .preview-box td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        .preview-box .total-row { font-weight: 700; background: #f0f0f0; }

        .toast {
            position: fixed; bottom: 20px; left: 20px; right: 20px; background: var(--success);
            color: #fff; padding: 15px 20px; border-radius: 30px; text-align: center;
            font-weight: 700; z-index: 300; opacity: 0; transform: translateY(20px);
            transition: all 0.3s ease; pointer-events: none;
            box-shadow: 0 10px 30px rgba(16,185,129,0.4);
            display: flex; justify-content: space-between; align-items: center; gap: 10px;
        }
        .toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .toast.error { background: var(--danger); }
        .toast .undo-btn {
            background: rgba(255,255,255,0.2); border: none; color: #fff;
            font-weight: 700; padding: 6px 14px; border-radius: 20px;
            cursor: pointer; font-family: inherit; font-size: 0.85rem;
        }
        .empty-state { text-align: center; color: var(--text2); padding: 40px 20px; }

        @media print {
            body { background: #fff; }
            .container, .hero, .filter-bar, .btn, .modal-overlay, .toast { display: none !important; }
            .preview-only { display: block !important; }
            .preview-box { box-shadow: none; border: none; max-height: none; }
        }
        .preview-only { display: none; }
    </style>
</head>
<body>
    <div class="galaxy"></div>
    <canvas class="stars-canvas" id="starsCanvas"></canvas>
    <div class="nebula"></div>
    <div class="grid-pattern"></div>

    <div class="container">
        <div class="hero">
            <h1>🧾 فاکتورساز</h1>
            <div class="stats-row">
                <div class="stat-item"><div class="stat-val cyan" id="totalInvoices">۰</div><div class="stat-lbl">فاکتور صادر شده</div></div>
                <div class="stat-item"><div class="stat-val gold" id="totalRevenue">۰</div><div class="stat-lbl">جمع فروش</div></div>
            </div>
        </div>

        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="🔍 جستجو در فاکتورها (شماره یا مشتری)...">
            <button class="btn primary" id="btnNewInvoice">🧾 فاکتور جدید</button>
        </div>

        <div class="invoice-list" id="invoiceList"><div class="empty-state">🧾 فاکتوری صادر نشده است.</div></div>
        <a href="../Dashboard.html" class="btn back">🏠 بازگشت به داشبورد</a>
    </div>

    <!-- MODAL: Invoice Form -->
    <div class="modal-overlay" id="modalInvoice">
        <div class="modal">
            <h3 id="modalTitle">🧾 فاکتور جدید</h3>
            <div class="form-row"><label>🏪 فروشگاه:</label><input type="text" id="invShop" placeholder="نام فروشگاه شما"></div>
            <div class="form-row"><label>👤 مشتری:</label><input type="text" id="invCustomer" placeholder="نام مشتری یا شرکت"></div>
            <div class="form-row"><label>📅 تاریخ:</label><input type="text" id="invDate" readonly></div>
            <div class="form-row"><label>🔢 شماره:</label><input type="text" id="invNumber" placeholder="خودکار پر می‌شود"></div>
            <h4 style="color:var(--gold); margin-top:15px;">📦 اقلام</h4>
            <div id="itemsContainer">
                <div class="item-row">
                    <input type="text" placeholder="نام کالا/خدمت" class="item-name">
                    <input type="number" placeholder="تعداد" class="item-qty" value="1">
                    <input type="number" placeholder="قیمت واحد" class="item-price">
                    <button class="btn danger remove-item" style="padding:6px 10px;font-size:0.8rem;">✕</button>
                </div>
            </div>
            <button class="btn outline" id="addItem" style="width:100%;margin-top:8px;">➕ افزودن کالا</button>
            <div class="form-row" style="margin-top:10px;"><label>🏷️ تخفیف (%):</label><input type="number" id="invDiscount" value="0"></div>
            <div class="form-row"><label>🧾 VAT (%):</label><input type="number" id="invVat" value="9"></div>
            <div style="text-align:center; font-weight:700; color:var(--gold); margin-top:10px;">💰 جمع: <span id="invTotalPreview">۰ تومان</span></div>
            <div class="btn-row">
                <button class="btn primary" id="saveInvoice">💾 ذخیره</button>
                <button class="btn outline" id="previewInvoice">👁️ پیش‌نمایش</button>
                <button class="btn" style="background:#333;" onclick="closeModal('modalInvoice')">انصراف</button>
            </div>
        </div>
    </div>

    <!-- MODAL: Preview -->
    <div class="modal-overlay" id="modalPreview">
        <div class="modal" style="max-width:650px;">
            <h3>👁️ پیش‌نمایش فاکتور</h3>
            <div class="preview-box" id="previewContent"></div>
            <div class="btn-row">
                <button class="btn primary" onclick="window.print()">🖨️ چاپ</button>
                <button class="btn" style="background:#333;" onclick="closeModal('modalPreview')">بستن</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"><span id="toastMsg"></span><button class="undo-btn" id="undoBtn" style="display:none;">↩ برگشت</button></div>

    <script>
        (function() {
            const STORAGE = 'faktorsaz_invoices_final';
            let invoices = [];
            let editingId = null;
            const fmt = v => (v||0).toLocaleString()+' تومان';
            const toastEl = document.getElementById('toast'), toastMsg = document.getElementById('toastMsg'), undoBtn = document.getElementById('undoBtn');
            function showToast(msg, isError=false, undoFn=null) {
                toastMsg.textContent = msg; toastEl.className = 'toast ' + (isError?'error':'') + ' show';
                if (undoFn) { undoBtn.style.display = 'block'; undoBtn.onclick = () => { undoFn(); toastEl.classList.remove('show'); }; }
                else undoBtn.style.display = 'none';
                setTimeout(() => toastEl.classList.remove('show'), 4000);
            }
            function save() { localStorage.setItem(STORAGE, JSON.stringify(invoices)); }
            function load() { invoices = JSON.parse(localStorage.getItem(STORAGE) || '[]'); }
            function closeModal(id) { document.getElementById(id).classList.remove('active'); }
            function genNumber() { return 'INV-' + Date.now().toString().slice(-6); }
            function calcTotal() {
                let total = 0;
                document.querySelectorAll('#itemsContainer .item-row').forEach(row => {
                    const qty = parseInt(row.querySelector('.item-qty')?.value) || 0;
                    const price = parseInt(row.querySelector('.item-price')?.value) || 0;
                    total += qty * price;
                });
                const disc = parseInt(document.getElementById('invDiscount')?.value) || 0;
                const vat = parseInt(document.getElementById('invVat')?.value) || 0;
                const afterDisc = total - (total * disc / 100);
                const final = afterDisc + (afterDisc * vat / 100);
                document.getElementById('invTotalPreview').textContent = fmt(final);
                return final;
            }
            function addItemRow() {
                const container = document.getElementById('itemsContainer');
                const row = document.createElement('div'); row.className = 'item-row';
                row.innerHTML = '<input type="text" placeholder="نام کالا/خدمت" class="item-name"><input type="number" placeholder="تعداد" class="item-qty" value="1"><input type="number" placeholder="قیمت واحد" class="item-price"><button class="btn danger remove-item" style="padding:6px 10px;font-size:0.8rem;">✕</button>';
                row.querySelectorAll('input').forEach(inp => inp.addEventListener('input', calcTotal));
                row.querySelector('.remove-item').addEventListener('click', () => { row.remove(); calcTotal(); });
                container.appendChild(row);
            }
            function getItems() {
                const items = [];
                document.querySelectorAll('#itemsContainer .item-row').forEach(row => {
                    const name = row.querySelector('.item-name')?.value.trim();
                    const qty = parseInt(row.querySelector('.item-qty')?.value) || 0;
                    const price = parseInt(row.querySelector('.item-price')?.value) || 0;
                    if (name) items.push({ name, qty, price });
                });
                return items;
            }

            // Stars
            const sc = document.getElementById('starsCanvas'), sctx = sc.getContext('2d');
            sc.width = window.innerWidth; sc.height = window.innerHeight;
            const stars = Array.from({length:200},()=>({x:Math.random()*sc.width,y:Math.random()*sc.height,r:Math.random()*1.6+0.3,a:Math.random(),sp:Math.random()*0.016+0.004}));
            (function d(){sctx.clearRect(0,0,sc.width,sc.height);stars.forEach(s=>{s.a+=s.sp;if(s.a>1||s.a<0.07)s.sp*=-1;sctx.beginPath();sctx.arc(s.x,s.y,s.r,0,Math.PI*2);sctx.fillStyle=`rgba(255,255,255,${Math.abs(s.a)})`;sctx.fill();});requestAnimationFrame(d);})();

            function render() {
                const search = (document.getElementById('searchInput')?.value||'').trim().toLowerCase();
                let filtered = invoices.filter(i => i.customer.toLowerCase().includes(search) || i.number.toLowerCase().includes(search));
                filtered.sort((a,b) => new Date(b.date) - new Date(a.date));
                const list = document.getElementById('invoiceList');
                if (filtered.length === 0) { list.innerHTML = '<div class="empty-state">🧾 فاکتوری یافت نشد.</div>'; }
                else list.innerHTML = filtered.map(i => `<div class="invoice-card" data-id="${i.id}"><div class="inv-info"><div class="inv-number">📄 ${i.number}</div><div class="inv-customer">👤 ${i.customer}</div><div class="inv-meta">📅 ${i.date} | 🏪 ${i.shop||'فروشگاه'}</div></div><div class="inv-total">${fmt(i.total)}</div></div>`).join('');
                document.getElementById('totalInvoices').textContent = invoices.length;
                document.getElementById('totalRevenue').textContent = fmt(invoices.reduce((a,i)=>a+i.total,0));
            }

            document.getElementById('btnNewInvoice').addEventListener('click', () => {
                editingId = null;
                document.getElementById('modalTitle').textContent = '🧾 فاکتور جدید';
                document.getElementById('invShop').value = localStorage.getItem('faktorsaz_shop') || '';
                document.getElementById('invCustomer').value = '';
                document.getElementById('invDate').value = new Date().toLocaleDateString('fa-IR');
                document.getElementById('invNumber').value = genNumber();
                document.getElementById('invDiscount').value = '0';
                document.getElementById('invVat').value = '9';
                document.getElementById('itemsContainer').innerHTML = '';
                addItemRow(); calcTotal();
                document.getElementById('modalInvoice').classList.add('active');
            });
            document.getElementById('addItem').addEventListener('click', addItemRow);

            document.getElementById('saveInvoice').addEventListener('click', () => {
                const shop = document.getElementById('invShop').value.trim();
                const customer = document.getElementById('invCustomer').value.trim();
                if (!customer) return showToast('نام مشتری الزامی است.', true);
                const items = getItems();
                if (items.length === 0) return showToast('حداقل یک کالا اضافه کنید.', true);
                const total = calcTotal();
                if (shop) localStorage.setItem('faktorsaz_shop', shop);
                const invoice = {
                    id: editingId || Date.now(),
                    shop: shop || 'فروشگاه',
                    customer,
                    date: document.getElementById('invDate').value,
                    number: document.getElementById('invNumber').value || genNumber(),
                    items,
                    discount: parseInt(document.getElementById('invDiscount').value) || 0,
                    vat: parseInt(document.getElementById('invVat').value) || 0,
                    total
                };
                if (editingId) { const idx = invoices.findIndex(i => i.id === editingId); if (idx >= 0) invoices[idx] = invoice; }
                else invoices.push(invoice);
                save(); render(); closeModal('modalInvoice');
                showToast('✅ فاکتور ذخیره شد.');
            });

            document.getElementById('previewInvoice').addEventListener('click', () => {
                const shop = document.getElementById('invShop').value.trim() || 'فروشگاه';
                const customer = document.getElementById('invCustomer').value.trim() || 'مشتری';
                const number = document.getElementById('invNumber').value || genNumber();
                const date = document.getElementById('invDate').value;
                const items = getItems();
                const disc = parseInt(document.getElementById('invDiscount').value) || 0;
                const vat = parseInt(document.getElementById('invVat').value) || 0;
                const subtotal = items.reduce((a,i) => a + i.qty * i.price, 0);
                const afterDisc = subtotal - (subtotal * disc / 100);
                const final = afterDisc + (afterDisc * vat / 100);
                let html = `<div style="text-align:center;font-weight:700;font-size:1.2rem;">${shop}</div><p>📄 شماره: ${number} | 📅 ${date}</p><p>👤 مشتری: ${customer}</p><table><thead><tr><th>ردیف</th><th>شرح</th><th>تعداد</th><th>قیمت واحد</th><th>جمع</th></tr></thead><tbody>`;
                items.forEach((it,idx) => html += `<tr><td>${idx+1}</td><td>${it.name}</td><td>${it.qty}</td><td>${fmt(it.price)}</td><td>${fmt(it.qty*it.price)}</td></tr>`);
                html += `<tr><td colspan="4">جمع اولیه</td><td>${fmt(subtotal)}</td></tr>`;
                if (disc) html += `<tr><td colspan="4">تخفیف (${disc}٪)</td><td>-${fmt(subtotal*disc/100)}</td></tr>`;
                if (vat) html += `<tr><td colspan="4">VAT (${vat}٪)</td><td>${fmt(afterDisc*vat/100)}</td></tr>`;
                html += `<tr class="total-row"><td colspan="4">💰 مبلغ نهایی</td><td>${fmt(final)}</td></tr></tbody></table><p style="text-align:center;margin-top:20px;">✍️ امضاء فروشنده</p>`;
                document.getElementById('previewContent').innerHTML = html;
                document.getElementById('modalPreview').classList.add('active');
            });

            document.getElementById('invoiceList').addEventListener('click', e => {
                const card = e.target.closest('.invoice-card');
                if (!card) return;
                const id = parseInt(card.dataset.id);
                const inv = invoices.find(i => i.id === id);
                if (!inv) return;
                editingId = id;
                document.getElementById('modalTitle').textContent = '✏️ ویرایش فاکتور';
                document.getElementById('invShop').value = inv.shop || '';
                document.getElementById('invCustomer').value = inv.customer;
                document.getElementById('invDate').value = inv.date;
                document.getElementById('invNumber').value = inv.number;
                document.getElementById('invDiscount').value = inv.discount;
                document.getElementById('invVat').value = inv.vat;
                document.getElementById('itemsContainer').innerHTML = '';
                inv.items.forEach(it => {
                    const row = document.createElement('div'); row.className = 'item-row';
                    row.innerHTML = `<input type="text" class="item-name" value="${it.name}"><input type="number" class="item-qty" value="${it.qty}"><input type="number" class="item-price" value="${it.price}"><button class="btn danger remove-item" style="padding:6px 10px;font-size:0.8rem;">✕</button>`;
                    row.querySelectorAll('input').forEach(inp => inp.addEventListener('input', calcTotal));
                    row.querySelector('.remove-item').addEventListener('click', () => { row.remove(); calcTotal(); });
                    document.getElementById('itemsContainer').appendChild(row);
                });
                calcTotal();
                document.getElementById('modalInvoice').classList.add('active');
            });

            document.getElementById('searchInput').addEventListener('input', render);
            document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', function(e){ if(e.target===this) this.classList.remove('active'); }));
            load(); render();
        })();
