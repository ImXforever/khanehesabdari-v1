<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>آزمون تستی جلسات ۱ تا ۶ | کیانوش کریمی</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: rgba(24,24,24,0.75);
            --surface2: rgba(40,40,40,0.5);
            --text: #f0f0f0;
            --text2: #c0c0c0;
            --primary: #fbbf24;
            --primary-light: #fde68a;
            --accent: #2dd4bf;
            --accent-light: rgba(45,212,191,0.15);
            --danger: #ef4444;
            --danger-light: rgba(239,68,68,0.15);
            --success: #22c55e;
            --success-light: rgba(34,197,94,0.15);
            --border: rgba(255,255,255,0.1);
            --shadow: 0 4px 20px rgba(0,0,0,0.5);
            --radius: 16px;
            --radius-sm: 10px;
            direction: rtl;
            font-size: 15px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Vazirmatn','B Nazanin','Tahoma',sans-serif;
            background: #0a0a0a; color: var(--text); line-height: 1.8;
            min-height: 100vh; padding: 12px; display: flex; justify-content: center;
            -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased;
            position: relative; overflow-x: hidden;
        }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .particle { position: absolute; border-radius: 50%; animation: floatUp linear infinite; opacity: 0.55; }
        @keyframes floatUp {
            0% { transform: translateY(105vh) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.2; }
            100% { transform: translateY(-10vh) scale(1.4); opacity: 0; }
        }
        .drift-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; animation: drift 12s ease-in-out infinite;
            opacity: 0.2;
            background: radial-gradient(circle at 30% 40%, #fbbf24 0%, transparent 40%),
                radial-gradient(circle at 70% 60%, #22c55e 0%, transparent 40%),
                radial-gradient(circle at 50% 20%, #ef4444 0%, transparent 35%);
        }
        @keyframes drift {
            0% { transform: translateX(0); }
            50% { transform: translateX(18px); }
            100% { transform: translateX(0); }
        }
        .container { position: relative; z-index: 1; max-width: 900px; width: 100%; display: flex; flex-direction: column; gap: 14px; }
        .header {
            background: rgba(24,24,24,0.7); backdrop-filter: blur(22px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
            padding: 20px 18px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); text-align: center;
            position: relative; overflow: hidden;
        }
        .header::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, #fbbf24, #22c55e, #fbbf24);
            background-size: 200% 100%; animation: headerBar 3s linear infinite;
        }
        @keyframes headerBar {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .glow-text {
            font-size: 1.6rem; font-weight: 900;
            background: linear-gradient(135deg, #fbbf24, #22c55e);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .card {
            background: rgba(24,24,24,0.65); backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius);
            padding: 18px 16px; box-shadow: var(--shadow);
        }
        .quiz-block { margin: 10px 0; padding: 14px; background: rgba(40,40,40,0.4); border-radius: var(--radius-sm); }
        .quiz-block strong { display: block; margin-bottom: 8px; }
        .quiz-opt {
            display: block; width: 100%; text-align: right; padding: 10px 14px; margin: 5px 0;
            background: rgba(20,20,20,0.6); border: 2px solid rgba(255,255,255,0.1); border-radius: 8px;
            cursor: pointer; font-family: inherit; font-size: 0.9rem; transition: 0.2s; color: #e0e0e0;
        }
        .quiz-opt.correct { background: rgba(34,197,94,0.2); border-color: #22c55e; color: #22c55e; font-weight: 700; }
        .quiz-opt.wrong { background: rgba(239,68,68,0.2); border-color: #ef4444; color: #ef4444; }
        .quiz-opt:disabled { pointer-events: none; opacity: 0.85; }
        .progress-bar { height: 6px; background: rgba(40,40,40,0.6); border-radius: 6px; overflow: hidden; margin: 4px 0 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #fbbf24, #22c55e); width: 0%; transition: width 0.4s; border-radius: 6px; }
        .btn {
            display: inline-block; padding: 10px 22px; border-radius: 25px; border: none;
            font-family: inherit; font-weight: 700; cursor: pointer; font-size: 0.9rem; background: #fbbf24; color: #000;
        }
        .footer { text-align: center; font-size: 0.75rem; color: #666; padding: 10px; }
    </style>
</head>
<body>
    <div class="particles" id="pc"></div>
    <div class="drift-layer"></div>
    <div class="container">
        <div class="header">
            <h1 class="glow-text">📝 آزمون تستی: جلسات ۱ تا ۶</h1>
            <p style="color:#c0c0c0;">۲۵ سوال — اصول اولیه، دفتر روزنامه، دفتر کل، تراز آزمایشی، صورت سود و زیان، ترازنامه</p>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="pf"></div></div>
        <div id="quizContainer"></div>
        <div id="quizScore" style="text-align:center;font-weight:700;margin-top:8px;font-size:1.2rem;"></div>
        <div style="text-align:center;margin:15px 0;">
            <button class="btn" id="resetBtn">🔄 شروع دوباره</button>
        </div>
        <div class="footer">✍️ کیانوش کریمی | 📅 ۱۴۰۴</div>
    </div>
    <script>
        const pc=document.getElementById('pc');
        for(let i=0;i<50;i++){
            const p=document.createElement('div');p.classList.add('particle');
            const s=Math.random()*5+2;
            p.style.width=s+'px';p.style.height=s+'px';
            p.style.left=Math.random()*100+'%';
            p.style.animationDuration=Math.random()*18+10+'s';
            p.style.animationDelay=Math.random()*12+'s';
            const colors=['#fbbf24','#22c55e','#ef4444','#2dd4bf','#f59e0b'];
            p.style.background=colors[Math.floor(Math.random()*colors.length)];
            p.style.boxShadow=`0 0 ${s+3}px ${p.style.background}`;
            pc.appendChild(p);
        }
        const quizData=[
            {q:'کدام یک دارایی جاری نیست؟',opts:['موجودی کالا','حساب‌های دریافتنی','ساختمان','وجه نقد'],ans:2},
            {q:'معادله اساسی حسابداری کدام است؟',opts:['دارایی = بدهی - سرمایه','دارایی = بدهی + سرمایه','سرمایه = دارایی + بدهی','بدهی = دارایی + سرمایه'],ans:1},
            {q:'ماهیت حساب "بدهی" چیست؟',opts:['بدهکار','بستانکار','خنثی','بستگی دارد'],ans:1},
            {q:'در ثبت دفتر روزنامه، ابتدا کدام حساب نوشته می‌شود؟',opts:['بستانکار','بدهکار','تفاوتی ندارد','سرمایه'],ans:1},
            {q:'خرید نقدی کالا: کدام حساب بدهکار می‌شود؟',opts:['بانک','حساب پرداختنی','موجودی کالا','سرمایه'],ans:2},
            {q:'در حساب T، بدهکار روزنامه به کدام سمت می‌رود؟',opts:['راست','چپ','وسط','هیچکدام'],ans:1},
            {q:'مانده حساب بانک با ماهیت بدهکار چگونه محاسبه می‌شود؟',opts:['جمع بستانکار - جمع بدهکار','جمع بدهکار - جمع بستانکار','جمع بدهکار + جمع بستانکار','متوسط'],ans:1},
            {q:'هدف تراز آزمایشی چیست؟',opts:['محاسبه سود','بررسی تساوی بدهکار و بستانکار','تهیه صورت جریان نقد','ثبت رویدادها'],ans:1},
            {q:'کدام خطا توسط تراز آزمایشی کشف می‌شود؟',opts:['ثبت در حساب اشتباه','فراموشی کامل ثبت','ثبت یک‌طرفه','جبران خطاها'],ans:2},
            {q:'صورت سود و زیان چه چیزی را نشان می‌دهد؟',opts:['وضعیت در یک لحظه','عملکرد یک دوره','جریان نقد','دارایی‌ها'],ans:1},
            {q:'سود ناخالص چگونه محاسبه می‌شود؟',opts:['فروش - هزینه‌های عملیاتی','فروش خالص - بهای تمام‌شده','سود عملیاتی - مالیات','فروش - مالیات'],ans:1},
            {q:'کدام یک هزینه غیرعملیاتی است؟',opts:['حقوق','اجاره','بهره بانکی','بهای تمام‌شده'],ans:2},
            {q:'ترازنامه وضعیت مالی را در چه زمانی نشان می‌دهد؟',opts:['یک دوره','یک لحظه','همیشه','هیچکدام'],ans:1},
            {q:'کدام یک بدهی جاری است؟',opts:['وام بلندمدت','حساب‌های پرداختنی','اوراق قرضه','سرمایه'],ans:1},
            {q:'نسبت جاری چگونه محاسبه می‌شود؟',opts:['دارایی جاری ÷ بدهی جاری','بدهی جاری ÷ دارایی جاری','دارایی ثابت ÷ بدهی جاری','فروش ÷ دارایی'],ans:0},
            {q:'افزایش حساب‌های دریافتنی چه اثری دارد؟',opts:['کاهش سود نقدی','افزایش سود نقدی','بی‌تأثیر','کاهش بدهی'],ans:0},
            {q:'دریافت وام بانکی: کدام حساب بستانکار می‌شود؟',opts:['بانک','وام بانکی','سرمایه','هزینه'],ans:1},
            {q:'پرداخت بدهی: کدام حساب بدهکار می‌شود؟',opts:['بانک','حساب پرداختنی','موجودی کالا','سرمایه'],ans:1},
            {q:'اگر دارایی ۵۰۰ و بدهی ۲۰۰ باشد، سرمایه چند است؟',opts:['۷۰۰','۳۰۰','۲۰۰','۵۰۰'],ans:1},
            {q:'کدام حساب ماهیت بدهکار دارد؟',opts:['درآمد','سرمایه','هزینه','بدهی'],ans:2},
            {q:'در ثبت تعدیلی پیش‌پرداخت، کدام حساب بدهکار می‌شود؟',opts:['پیش‌پرداخت','هزینه','بانک','بدهی'],ans:1},
            {q:'استهلاک انباشته چه نوع حسابی است؟',opts:['بدهی','هزینه','دارایی کاهنده','سرمایه'],ans:2},
            {q:'هدف اصلی ثبت‌های تعدیلی چیست؟',opts:['افزایش فروش','تطبیق حساب‌ها با واقعیت','محاسبه مالیات','تهیه تراز آزمایشی'],ans:1},
            {q:'کدام دارایی استهلاک ندارد؟',opts:['ساختمان','ماشین‌آلات','زمین','وسایل نقلیه'],ans:2},
            {q:'ذخیره مطالبات مشکوک‌الوصول چه نوع حسابی است؟',opts:['بدهی','هزینه','دارایی کاهنده','سرمایه'],ans:2},
        ];
        const qc=document.getElementById('quizContainer');
        let qa=0,qco=0,qf=false;
        quizData.forEach((q,idx)=>{
            const block=document.createElement('div');block.className='quiz-block';
            block.innerHTML=`<strong>${idx+1}. ${q.q}</strong>`;
            q.opts.forEach((opt,optIdx)=>{
                const btn=document.createElement('button');btn.className='quiz-opt';btn.textContent=opt;
                btn.addEventListener('click',()=>{
                    if(btn.disabled)return;
                    const all=block.querySelectorAll('.quiz-opt');all.forEach(b=>b.disabled=true);
                    if(optIdx===q.ans){btn.classList.add('correct');qco++;}
                    else{btn.classList.add('wrong');all[q.ans].classList.add('correct');}
                    qa++;
                    document.getElementById('pf').style.width=Math.round((qa/quizData.length)*100)+'%';
                    if(qa===quizData.length&&!qf){
                        qf=true;
                        document.getElementById('quizScore').innerHTML=`🎯 نتیجه: ${qco} از ${quizData.length} — ${qco>=20?'عالی!':qco>=15?'خوب':'بیشتر تمرین کن'}`;
                    }
                });
                block.appendChild(btn);
            });
            qc.appendChild(block);
        });
        document.getElementById('resetBtn').addEventListener('click',()=>{
            document.querySelectorAll('.quiz-opt').forEach(o=>{o.classList.remove('correct','wrong');o.disabled=false;});
            document.getElementById('quizScore').innerHTML='';
            document.getElementById('pf').style.width='0%';
            qa=0;qco=0;qf=false;
            window.scrollTo({top:0,behavior:'smooth'});
        });
    </script>
</body>
</html>
