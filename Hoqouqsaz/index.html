<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>حقوق‌ساز | محاسبه حقوق و فیش حقوقی</title>
    <style>
        :root {
            --bg: #02010a;
            --surface: rgba(17, 15, 28, 0.75);
            --surface2: rgba(30, 25, 50, 0.55);
            --text: #f1f5f9;
            --text2: #94a3b8;
            --primary: #f59e0b;
            --primary-glow: #fbbf24;
            --danger: #ef4444;
            --danger-glow: #f87171;
            --success: #10b981;
            --success-glow: #34d399;
            --info: #3b82f6;
            --border: rgba(255, 255, 255, 0.07);
            --glass-blur: blur(22px);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --shadow: 0 8px 32px rgba(0,0,0,0.5);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.6);
            --radius-sm: 12px;
            --radius: 18px;
            --radius-lg: 24px;
            --font: 'Vazirmatn', system-ui, -apple-system, sans-serif;
            direction: rtl;
            scroll-behavior: smooth;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font);
            background: #02010a;
            color: var(--text);
            line-height: 1.75;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 18px;
            overflow-x: hidden;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }
        .galaxy {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at 40% 20%, #1a1408 0%, transparent 55%),
                radial-gradient(ellipse at 60% 70%, #100520 0%, transparent 50%);
            z-index: 0; pointer-events: none;
        }
        .stars-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .nebula {
            position: fixed; bottom: -10%; left: -8%; width: 360px; height: 360px;
            background: radial-gradient(circle, rgba(245,158,11,0.10) 0%, transparent 70%);
            border-radius: 50%; filter: blur(60px); animation: nebulaDrift 24s ease-in-out infinite;
            pointer-events: none; z-index: 0;
        }
        @keyframes nebulaDrift {
            0%,100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(25px,-15px) scale(1.12); }
            66% { transform: translate(-20px,20px) scale(0.92); }
        }
        .grid-pattern {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background-image: linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
            background-size: 45px 45px; pointer-events:none; z-index:0;
        }

        .container { position: relative; z-index: 1; max-width: 750px; width: 100%; display: flex; flex-direction: column; gap: 18px; }

        .hero {
            background: rgba(17,15,28,0.65); backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border); border-radius: var(--radius-lg);
            padding: 24px 20px; text-align: center; box-shadow: var(--shadow-lg);
        }
        .hero h1 { font-size: clamp(1.5rem, 4vw, 2rem); font-weight: 900; color: var(--primary-glow); }
        .stats-row { display: flex; justify-content: center; gap: 20px; margin-top: 10px; flex-wrap: wrap; }
        .stat-item { text-align: center; }
        .stat-val { font-size: 1.3rem; font-weight: 900; }
        .stat-val.gold { color: var(--primary-glow); }
        .stat-val.red { color: var(--danger); }
        .stat-val.green { color: var(--success); }
        .stat-lbl { font-size: 0.75rem; color: var(--text2); }

        .filter-bar { display: flex; flex-wrap: wrap; gap: 8px; }
        .filter-bar input {
            flex: 2; min-width: 140px; padding: 12px 16px; border-radius: 30px;
            border: 2px solid var(--border); background: rgba(17,15,28,0.55);
            backdrop-filter: blur(10px); color: #fff; font-family: inherit; font-size: 0.9rem;
        }
        .filter-bar input:focus { border-color: var(--primary); outline: none; }
        .btn {
            padding: 11px 18px; border-radius: 30px; border: none; font-family: inherit;
            font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.2s ease;
            display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
        }
        .btn.primary { background: var(--primary); color: #000; }
        .btn.info { background: var(--info); color: #fff; }
        .btn.success { background: var(--success); color: #fff; }
        .btn.back {
            background: transparent; border: 2px solid var(--primary); color: var(--primary-glow);
            text-decoration: none; width: fit-content; margin-top: 4px;
        }
        .btn:active { transform: scale(0.96); }

        .employee-grid { display: grid; gap: 10px; }
        .employee-card {
            background: rgba(17,15,28,0.55); backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border); border-radius: var(--radius);
            padding: 16px; display: flex; align-items: center; gap: 12px;
            box-shadow: var(--shadow-sm); transition: all 0.2s ease; flex-wrap: wrap;
        }
        .employee-card:hover { border-color: rgba(245,158,11,0.3); box-shadow: 0 6px 20px rgba(245,158,11,0.12); }
        .emp-info { flex: 1; min-width: 130px; }
        .emp-name { font-weight: 700; font-size: 1.05rem; }
        .emp-position { font-size: 0.8rem; color: var(--primary-glow); }
        .emp-detail { font-size: 0.85rem; color: var(--text2); margin-top: 4px; }
        .actions { display: flex; gap: 6px; flex-shrink: 0; }
        .act-btn {
            width: 38px; height: 38px; border-radius: 50%; border: none;
            font-size: 1.1rem; font-weight: 700; color: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .act-btn.edit { background: var(--info); }
        .act-btn.edit:hover { box-shadow: 0 0 12px rgba(59,130,246,0.5); }
        .act-btn.payslip { background: var(--success); }
        .act-btn.payslip:hover { box-shadow: 0 0 12px rgba(16,185,129,0.5); }

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.78); backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
            z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal {
            background: rgba(24,22,36,0.95); backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border); border-radius: var(--radius-lg);
            padding: 24px 20px; width: 92%; max-width: 500px; box-shadow: var(--shadow-lg);
            max-height: 85vh; overflow-y: auto;
        }
        .modal h3 { color: var(--primary-glow); margin-bottom: 14px; text-align: center; font-size: 1.15rem; }
        .form-row { margin: 8px 0; text-align: right; }
        .form-row label { display: block; margin-bottom: 5px; color: var(--text2); font-size: 0.85rem; }
        .form-row input { width: 100%; padding: 13px 14px; border-radius: var(--radius-sm); border: 2px solid var(--border); background: #0f0c1a; color: #fff; font-family: inherit; font-size: 0.9rem; }
        .form-row input:focus { border-color: var(--primary); outline: none; }
        .btn-row { display: flex; gap: 10px; margin-top: 16px; }
        .btn-row .btn { flex: 1; justify-content: center; }

        .preview-box {
            background: #fff; color: #000; padding: 25px; border-radius: var(--radius-sm);
            font-size: 0.9rem; line-height: 2; max-height: 70vh; overflow-y: auto;
        }
        .preview-box table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        .preview-box td { border: 1px solid #ccc; padding: 8px; text-align: center; }

        .toast {
            position: fixed; bottom: 20px; left: 20px; right: 20px; background: var(--success);
            color: #fff; padding: 15px 20px; border-radius: 30px; text-align: center;
            font-weight: 700; z-index: 300; opacity: 0; transform: translateY(20px);
            transition: all 0.3s ease; pointer-events: none;
            box-shadow: 0 10px 30px rgba(16,185,129,0.4);
            display: flex; justify-content: space-between; align-items: center; gap: 10px;
        }
        .toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .toast.error { background: var(--danger); }
        .toast .undo-btn {
            background: rgba(255,255,255,0.2); border: none; color: #fff;
            font-weight: 700; padding: 6px 14px; border-radius: 20px;
            cursor: pointer; font-family: inherit; font-size: 0.85rem;
        }
        .empty-state { text-align: center; color: var(--text2); padding: 40px 20px; }

        @media print {
            body { background: #fff; }
            .container, .hero, .filter-bar, .btn, .modal-overlay, .toast { display: none !important; }
            .preview-box { box-shadow: none; border: none; max-height: none; }
        }
    </style>
</head>
<body>
    <div class="galaxy"></div>
    <canvas class="stars-canvas" id="starsCanvas"></canvas>
    <div class="nebula"></div>
    <div class="grid-pattern"></div>

    <div class="container">
        <div class="hero">
            <h1>💰 حقوق‌ساز</h1>
            <div class="stats-row">
                <div class="stat-item"><div class="stat-val gold" id="totalEmployees">۰</div><div class="stat-lbl">کارمند</div></div>
                <div class="stat-item"><div class="stat-val red" id="totalInsurance">۰</div><div class="stat-lbl">بیمه کارفرما</div></div>
                <div class="stat-item"><div class="stat-val green" id="totalNet">۰</div><div class="stat-lbl">خالص پرداختی</div></div>
            </div>
        </div>

        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="🔍 جستجوی نام کارمند...">
            <button class="btn primary" id="btnAddEmployee">➕ کارمند جدید</button>
        </div>

        <div class="employee-grid" id="employeeList"><div class="empty-state">👤 کارمندی ثبت نشده است.</div></div>
        <a href="../Dashboard.html" class="btn back">🏠 بازگشت به داشبورد</a>
    </div>

    <!-- MODAL: Add/Edit Employee -->
    <div class="modal-overlay" id="modalEmployee">
        <div class="modal">
            <h3 id="modalTitle">➕ کارمند جدید</h3>
            <div class="form-row"><label>👤 نام:</label><input type="text" id="empName"></div>
            <div class="form-row"><label>💼 سمت:</label><input type="text" id="empPosition"></div>
            <div class="form-row"><label>💰 حقوق پایه:</label><input type="number" id="empBaseSalary"></div>
            <div class="form-row"><label>➕ مزایا:</label><input type="number" id="empBenefits" value="0"></div>
            <div class="form-row"><label>📊 بیمه کارگر (%):</label><input type="number" id="empWorkerIns" value="7"></div>
            <div class="form-row"><label>🏢 بیمه کارفرما (%):</label><input type="number" id="empEmployerIns" value="23"></div>
            <div class="form-row"><label>🧾 مالیات (%):</label><input type="number" id="empTaxRate" value="0"></div>
            <div class="btn-row">
                <button class="btn primary" id="saveEmployee">💾 ذخیره</button>
                <button class="btn" style="background:#333;" onclick="closeModal('modalEmployee')">انصراف</button>
            </div>
        </div>
    </div>

    <!-- MODAL: Payslip -->
    <div class="modal-overlay" id="modalPayslip">
        <div class="modal" style="max-width:600px;">
            <h3>🧾 فیش حقوقی</h3>
            <div class="preview-box" id="payslipContent"></div>
            <div class="btn-row">
                <button class="btn primary" onclick="window.print()">🖨️ چاپ</button>
                <button class="btn" style="background:#333;" onclick="closeModal('modalPayslip')">بستن</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"><span id="toastMsg"></span><button class="undo-btn" id="undoBtn" style="display:none;">↩ برگشت</button></div>

    <script>
        (function() {
            const STORAGE = 'hoquq_v3';
            let employees = [];
            let editingId = null;
            const fmt = v => (v||0).toLocaleString()+' تومان';
            const toastEl = document.getElementById('toast'), toastMsg = document.getElementById('toastMsg'), undoBtn = document.getElementById('undoBtn');
            function showToast(msg, isError=false, undoFn=null) {
                toastMsg.textContent = msg; toastEl.className = 'toast ' + (isError?'error':'') + ' show';
                if (undoFn) { undoBtn.style.display = 'block'; undoBtn.onclick = () => { undoFn(); toastEl.classList.remove('show'); }; }
                else undoBtn.style.display = 'none';
                setTimeout(() => toastEl.classList.remove('show'), 4000);
            }
            function save() { localStorage.setItem(STORAGE, JSON.stringify(employees)); }
            function load() { employees = JSON.parse(localStorage.getItem(STORAGE) || '[]'); }
            function closeModal(id) { document.getElementById(id).classList.remove('active'); }

            // Stars
            const sc = document.getElementById('starsCanvas'), sctx = sc.getContext('2d');
            sc.width = window.innerWidth; sc.height = window.innerHeight;
            const stars = Array.from({length:200},()=>({x:Math.random()*sc.width,y:Math.random()*sc.height,r:Math.random()*1.6+0.3,a:Math.random(),sp:Math.random()*0.016+0.004}));
            (function d(){sctx.clearRect(0,0,sc.width,sc.height);stars.forEach(s=>{s.a+=s.sp;if(s.a>1||s.a<0.07)s.sp*=-1;sctx.beginPath();sctx.arc(s.x,s.y,s.r,0,Math.PI*2);sctx.fillStyle=`rgba(255,255,255,${Math.abs(s.a)})`;sctx.fill();});requestAnimationFrame(d);})();

            function render() {
                const search = (document.getElementById('searchInput')?.value||'').trim().toLowerCase();
                let filtered = employees.filter(e => e.name.toLowerCase().includes(search));
                const list = document.getElementById('employeeList');
                if (filtered.length === 0) { list.innerHTML = '<div class="empty-state">👤 کارمندی یافت نشد.</div>'; }
                else {
                    list.innerHTML = filtered.map(e => {
                        const gross = (e.baseSalary||0) + (e.benefits||0);
                        const wIns = Math.round(gross * (e.workerIns||7) / 100);
                        const tax = Math.round(gross * (e.taxRate||0) / 100);
                        const net = gross - wIns - tax;
                        return `<div class="employee-card">
                            <div class="emp-info">
                                <div class="emp-name">${e.name}</div>
                                <div class="emp-position">${e.position || '—'}</div>
                                <div class="emp-detail">ناخالص: ${fmt(gross)} | خالص: ${fmt(net)}</div>
                            </div>
                            <div class="actions">
                                <button class="act-btn edit" data-id="${e.id}">✏️</button>
                                <button class="act-btn payslip" data-id="${e.id}">🧾</button>
                            </div>
                        </div>`;
                    }).join('');
                }
                document.getElementById('totalEmployees').textContent = employees.length;
                const totalIns = employees.reduce((a, e) => a + Math.round(((e.baseSalary||0)+(e.benefits||0)) * (e.employerIns||23) / 100), 0);
                const totalNet = employees.reduce((a, e) => {
                    const g = (e.baseSalary||0)+(e.benefits||0);
                    return a + g - Math.round(g*(e.workerIns||7)/100) - Math.round(g*(e.taxRate||0)/100);
                }, 0);
                document.getElementById('totalInsurance').textContent = fmt(totalIns);
                document.getElementById('totalNet').textContent = fmt(totalNet);
            }

            document.getElementById('btnAddEmployee').addEventListener('click', () => {
                editingId = null;
                document.getElementById('modalTitle').textContent = '➕ کارمند جدید';
                ['empName','empPosition','empBaseSalary','empBenefits','empWorkerIns','empEmployerIns','empTaxRate'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('empBenefits').value = '0';
                document.getElementById('empWorkerIns').value = '7';
                document.getElementById('empEmployerIns').value = '23';
                document.getElementById('empTaxRate').value = '0';
                document.getElementById('modalEmployee').classList.add('active');
            });

            document.getElementById('employeeList').addEventListener('click', e => {
                const editBtn = e.target.closest('.edit');
                const payBtn = e.target.closest('.payslip');
                if (!editBtn && !payBtn) return;
                const id = parseInt((editBtn || payBtn).dataset.id);
                const emp = employees.find(e => e.id === id);
                if (!emp) return;

                if (editBtn) {
                    editingId = id;
                    document.getElementById('modalTitle').textContent = '✏️ ویرایش کارمند';
                    document.getElementById('empName').value = emp.name;
                    document.getElementById('empPosition').value = emp.position || '';
                    document.getElementById('empBaseSalary').value = emp.baseSalary || '';
                    document.getElementById('empBenefits').value = emp.benefits || 0;
                    document.getElementById('empWorkerIns').value = emp.workerIns || 7;
                    document.getElementById('empEmployerIns').value = emp.employerIns || 23;
                    document.getElementById('empTaxRate').value = emp.taxRate || 0;
                    document.getElementById('modalEmployee').classList.add('active');
                }

                if (payBtn) {
                    const gross = (emp.baseSalary||0) + (emp.benefits||0);
                    const wIns = Math.round(gross * (emp.workerIns||7) / 100);
                    const eIns = Math.round(gross * (emp.employerIns||23) / 100);
                    const tax = Math.round(gross * (emp.taxRate||0) / 100);
                    const net = gross - wIns - tax;
                    const date = new Date().toLocaleDateString('fa-IR');
                    document.getElementById('payslipContent').innerHTML = `
                        <div style="text-align:center;font-weight:700;font-size:1.1rem;">🧾 فیش حقوقی</div>
                        <p>👤 ${emp.name} | 💼 ${emp.position||'—'} | 📅 ${date}</p>
                        <table><tbody>
                        <tr><td>حقوق پایه</td><td>${fmt(emp.baseSalary)}</td></tr>
                        <tr><td>مزایا</td><td>${fmt(emp.benefits)}</td></tr>
                        <tr><td><strong>ناخالص</strong></td><td><strong>${fmt(gross)}</strong></td></tr>
                        <tr><td>بیمه کارگر (${emp.workerIns||7}٪)</td><td style="color:red;">-${fmt(wIns)}</td></tr>
                        <tr><td>مالیات (${emp.taxRate||0}٪)</td><td style="color:red;">-${fmt(tax)}</td></tr>
                        <tr style="font-weight:700;background:#f0fdf4;"><td>👤 خالص پرداختی</td><td>${fmt(net)}</td></tr>
                        <tr><td colspan="2" style="background:#fef3c7;">🏢 هزینه کارفرما: ${fmt(gross+eIns)} (شامل ${fmt(eIns)} بیمه)</td></tr>
                        </tbody></table>
                        <p style="text-align:center;margin-top:15px;">✍️ امضاء | 📅 ${date}</p>`;
                    document.getElementById('modalPayslip').classList.add('active');
                }
            });

            document.getElementById('saveEmployee').addEventListener('click', () => {
                const name = document.getElementById('empName').value.trim();
                if (!name) return showToast('نام الزامی است.', true);
                const data = {
                    id: editingId || Date.now(),
                    name,
                    position: document.getElementById('empPosition').value.trim(),
                    baseSalary: parseInt(document.getElementById('empBaseSalary').value) || 0,
                    benefits: parseInt(document.getElementById('empBenefits').value) || 0,
                    workerIns: parseInt(document.getElementById('empWorkerIns').value) || 7,
                    employerIns: parseInt(document.getElementById('empEmployerIns').value) || 23,
                    taxRate: parseInt(document.getElementById('empTaxRate').value) || 0
                };
                if (editingId) { const idx = employees.findIndex(e => e.id === editingId); if (idx >= 0) employees[idx] = data; }
                else employees.push(data);
                save(); render(); closeModal('modalEmployee');
                showToast('✅ ذخیره شد.');
            });

            document.getElementById('searchInput').addEventListener('input', render);
            document.querySelectorAll('.modal-overlay').forEach(o => o.addEventListener('click', function(e){ if(e.target===this) this.classList.remove('active'); }));
            load(); render();
        })();
    </script>
</body>
</html>
